    </linearGradient>
    <style>
      .label { fill: #d8eef1; font: 500 28px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .hint { fill: #8db5b8; font: 400 19px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0; }
      .card { fill: url(#panel); stroke: rgba(255,255,255,.16); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1680" height="760" fill="#e7f4f5" />

  <g transform="translate(48 48)">
