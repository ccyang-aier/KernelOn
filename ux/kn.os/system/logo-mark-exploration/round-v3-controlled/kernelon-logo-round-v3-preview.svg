<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 760" role="img" aria-label="KernelOn rounded logo mark exploration preview">
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102d34" />
